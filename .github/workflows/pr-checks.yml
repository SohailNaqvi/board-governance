name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Typecheck all packages
        run: pnpm -r typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Build Next.js app
        run: pnpm --filter @ums/web build

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_e2e
      JWT_SECRET: e2e-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma db push --schema=prisma/schema.prisma --skip-generate

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: pnpm --filter @ums/web build

      - name: Copy standalone static assets and native modules
        run: |
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public 2>/dev/null || true
          # Copy argon2 native prebuilds into standalone node_modules
          ARGON2_SRC=$(find node_modules/.pnpm -path "*/argon2@*/node_modules/argon2" -type d | head -1)
          ARGON2_DST=$(find apps/web/.next/standalone -path "*/argon2@*/node_modules/argon2" -type d | head -1)
          if [ -n "$ARGON2_SRC" ] && [ -n "$ARGON2_DST" ]; then
            cp -r "$ARGON2_SRC/prebuilds" "$ARGON2_DST/" 2>/dev/null || true
            cp -r "$ARGON2_SRC/build" "$ARGON2_DST/" 2>/dev/null || true
            echo "Copied argon2 native binaries from $ARGON2_SRC to $ARGON2_DST"
          else
            echo "WARNING: Could not find argon2 directories for native binary copy"
          fi

      - name: Start server and run E2E tests
        run: |
          node apps/web/.next/standalone/apps/web/server.js &
          sleep 2
          curl --retry 10 --retry-delay 2 --retry-connrefused -sf http://localhost:3000/api/health -o /dev/null
          PLAYWRIGHT_BASE_URL=http://localhost:3000 npx playwright test
        env:
          HOSTNAME: 0.0.0.0
          PORT: 3000
          NODE_ENV: production
